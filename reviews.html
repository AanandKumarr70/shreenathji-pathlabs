        const slider = document.getElementById('spl-slider');

        let animationFrame;

        function getInitials(name) {

        }


        function renderStars(count) {
            let stars = '';
            for(let i = 0; i < 5; i++) {

            return stars;

                    </div>

                    ${imageHTML}
                </div>
            `;
            slider.appendChild(slide);
        });


        function updateSlider() {
            slider.style.transform = `translateX(-${currentIndex * 100}%)`;
            reviewCounter.textContent = `${currentIndex + 1} / ${patientReviews.length}`;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % patientReviews.length;
            updateSlider();
            startProgress();
        }

        function startProgress() {
            startTime = Date.now();
            cancelAnimationFrame(animationFrame);
            updateProgress();
        }

        function updateProgress() {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / slideDuration * 100, 100);
            progressBar.style.width = progress + '%';
            
            if (progress < 100) {
                animationFrame = requestAnimationFrame(updateProgress);
            } else {
                nextSlide();
            }
        }


        
        updateSlider();
        startProgress();


        slider.addEventListener('mouseenter', () => cancelAnimationFrame(animationFrame));
        slider.addEventListener('mouseleave', () => startProgress());
